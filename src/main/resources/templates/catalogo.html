<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catalogo - GameStore</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" th:href="@{/}">GameStore</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" th:href="@{/}">Inicio</a>
                <a class="nav-link active" th:href="@{/catalogo}">Catalogo</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h2 class="mb-4">Catalogo de Videojuegos</h2>

        <!-- Formulario de filtros: GET para que la URL sea compartible y la paginacion respete los filtros -->
        <form method="get" th:action="@{/catalogo}" class="row g-3 mb-4">
            <div class="col-md-3">
                <select class="form-select bg-dark text-white" name="generoId" onchange="this.form.submit()">
                    <option value="">Todos los generos</option>
                    <option th:each="g : ${generos}"
                            th:value="${g.id}"
                            th:text="${g.nombre}"
                            th:selected="${g.id == generoId}">
                    </option>
                </select>
            </div>
            <div class="col-md-3">
                <select class="form-select bg-dark text-white" name="plataformaId" onchange="this.form.submit()">
                    <option value="">Todas las plataformas</option>
                    <option th:each="p : ${plataformas}"
                            th:value="${p.id}"
                            th:text="${p.nombre}"
                            th:selected="${p.id == plataformaId}">
                    </option>
                </select>
            </div>
            <div class="col-md-4">
                <input type="text" class="form-control bg-dark text-white" name="busqueda"
                       placeholder="Buscar juego..." th:value="${busqueda}">
            </div>
            <div class="col-md-2">
                <button type="submit" class="btn btn-warning w-100">Buscar</button>
            </div>
        </form>

        <p class="text-muted mb-3" th:text="${totalResultados} + ' juego(s) encontrado(s)'">0 resultados</p>

        <div class="row g-4">
            <div class="col-md-3" th:each="juego : ${juegos}">
                <div class="card h-100">
                    <img th:if="${juego.imagenUrl}" th:src="${juego.imagenUrl}" class="card-img-top" alt="portada">
                    <div class="card-body">
                        <h5 class="card-title text-warning" th:text="${juego.titulo}">Titulo</h5>
                        <p class="card-text small" th:text="${juego.descripcion}">Descripcion</p>
                        <p class="mb-1">
                            <span class="badge bg-secondary" th:text="${juego.genero.nombre}">Genero</span>
                            <span class="badge bg-secondary" th:text="${juego.plataforma.nombre}">Plataforma</span>
                        </p>
                        <p class="fw-bold text-success mb-1" th:text="'$' + ${juego.precio}">$0.00</p>
                        <span class="badge bg-dark border" th:text="'Stock: ' + ${juego.stock}">Stock</span>
                    </div>
                </div>
            </div>

            <div class="col-12" th:if="${#lists.isEmpty(juegos)}">
                <p class="text-center text-muted py-5">No se encontraron videojuegos con esos filtros.</p>
            </div>
        </div>

        <!-- Paginacion, preservando filtros activos -->
        <nav class="mt-5" th:if="${totalPaginas > 1}">
            <ul class="pagination justify-content-center">
                <li class="page-item" th:classappend="${paginaActual == 0} ? 'disabled'">
                    <a class="page-link"
                       th:href="@{/catalogo(generoId=${generoId}, plataformaId=${plataformaId}, busqueda=${busqueda}, pagina=${paginaActual - 1})}">Anterior</a>
                </li>
                <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPaginas - 1)}"
                    th:classappend="${i == paginaActual} ? 'active'">
                    <a class="page-link"
                       th:href="@{/catalogo(generoId=${generoId}, plataformaId=${plataformaId}, busqueda=${busqueda}, pagina=${i})}"
                       th:text="${i + 1}">1</a>
                </li>
                <li class="page-item" th:classappend="${paginaActual >= totalPaginas - 1} ? 'disabled'">
                    <a class="page-link"
                       th:href="@{/catalogo(generoId=${generoId}, plataformaId=${plataformaId}, busqueda=${busqueda}, pagina=${paginaActual + 1})}">Siguiente</a>
                </li>
            </ul>
        </nav>
    </div>

    <footer class="bg-dark text-white text-center py-3 mt-5">
        <p class="mb-0">2026 GameStore - Hector Guaman y Uriel Acosta</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
