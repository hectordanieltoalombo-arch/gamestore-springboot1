<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameStore</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" th:href="@{/}">GameStore</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" th:href="@{/}">Inicio</a>
                <a class="nav-link" th:href="@{/catalogo}">Catalogo</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="p-5 mb-4 bg-dark text-white rounded-3 text-center">
            <h1 class="fw-bold">Bienvenido a GameStore</h1>
            <p class="fs-5">Los mejores videojuegos al mejor precio</p>
            <a th:href="@{/catalogo}" class="btn btn-warning btn-lg">Ver Catalogo</a>
        </div>

        <h3 class="mb-3">Generos disponibles</h3>
        <div class="row g-3 mb-5">
            <div class="col-md-2" th:each="genero : ${generos}">
                <a th:href="@{/catalogo(generoId=${genero.id})}" class="text-decoration-none">
                    <div class="card text-center genero-card">
                        <div class="card-body" th:text="${genero.nombre}">Genero</div>
                    </div>
                </a>
            </div>
        </div>
    </div>

    <footer class="bg-dark text-white text-center py-3 mt-5">
        <p class="mb-0">2026 GameStore - Hector Guaman y Uriel Acosta</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
